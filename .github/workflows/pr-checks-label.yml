name: PR Checks Label

on:
  workflow_run:
    workflows:
      - Check Lint and Types
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0].number != null
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
    steps:
      - name: Ensure labels exist
        run: |
          gh label create "checks: passing" --color "0e8a16" --description "CI checks passed" --force
          gh label create "checks: failing" --color "b60205" --description "CI checks failed" --force

      - name: Apply checks label
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            gh pr edit "$PR_NUMBER" --remove-label "checks: failing" 2>/dev/null || true
            gh pr edit "$PR_NUMBER" --add-label "checks: passing"
          else
            gh pr edit "$PR_NUMBER" --remove-label "checks: passing" 2>/dev/null || true
            gh pr edit "$PR_NUMBER" --add-label "checks: failing"
          fi
