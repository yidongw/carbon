name: Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [dev, main]

jobs:
  preview:
    runs-on: [self-hosted, macOS, preview]
    if: github.event.pull_request.head.repo.full_name == 'yidongw/carbon'
    permissions:
      pull-requests: write
    steps:
      - name: Post deploying status
        if: github.event.action != 'closed'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Delete previous bot comment so the new one triggers a notification
          PREV_ID=$(gh api "repos/yidongw/carbon/issues/${PR_NUMBER}/comments" \
            --jq '[.[] | select(.user.login == "github-actions[bot]")] | last | .id // empty')
          if [ -n "$PREV_ID" ]; then
            gh api -X DELETE "repos/yidongw/carbon/issues/comments/${PREV_ID}" 2>/dev/null || true
          fi
          BODY=$(printf '### Preview Deployment\n\n**ERP:** deploying...\n\nBuilt from `%s` @ `%s`\nRunning in dev mode — stack traces enabled.' \
            "$BRANCH" "$SHA")
          gh pr comment "$PR_NUMBER" --repo yidongw/carbon --body "$BODY"

      - name: Start preview
        if: github.event.action != 'closed'
        run: |
          /Users/xinjuan/preview/manage-preview.sh start \
            "${{ github.event.pull_request.number }}" \
            "${{ github.event.pull_request.head.ref }}"

      - name: Stop preview
        if: github.event.action == 'closed'
        run: |
          /Users/xinjuan/preview/manage-preview.sh stop \
            "${{ github.event.pull_request.number }}"

      - name: Post preview URL
        if: github.event.action != 'closed'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          PR_URL="https://erp-pr-${PR_NUMBER}.foxhole.bot"
          BODY=$(printf '### Preview Deployment\n\n**ERP:** %s\n\nBuilt from `%s` @ `%s`\nRunning in dev mode — stack traces enabled.' \
            "$PR_URL" "$BRANCH" "$SHA")
          # Edit the "deploying..." comment in place (already notified above)
          gh pr comment "$PR_NUMBER" \
            --repo yidongw/carbon \
            --body "$BODY" \
            --edit-last

      - name: Trigger test agent
        if: github.event.action != 'closed'
        env:
          # Must be a user PAT, NOT the default GITHUB_TOKEN: comments created
          # by GITHUB_TOKEN do not trigger workflow runs, so agent-trigger.yml
          # (issue_comment) would never fire and the bot would never be called.
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TEST_AGENT: ${{ vars.TEST_AGENT || '/cc' }}
        run: |
          gh pr comment "$PR_NUMBER" --repo yidongw/carbon --body "$TEST_AGENT"
