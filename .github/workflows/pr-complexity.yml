name: PR Complexity

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-complexity-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  complexity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/pr-complexity
          sparse-checkout-cone-mode: true

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --ignore-workspace --ignore-scripts
        working-directory: scripts/pr-complexity

      - name: Score PR complexity
        run: npx tsx index.ts
        working-directory: scripts/pr-complexity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
